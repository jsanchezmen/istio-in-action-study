apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istio-component-monitor
  namespace: monitoring
  labels:
    monitoring: istio-components
    release: prometheus
spec:
  jobLabel: istio
  targetLabels: [app]
  selector:
    matchLabels:
      istio: pilot
  namespaceSelector:
    any: true
  endpoints:
    - port: http-monitoring
      interval: 15s
